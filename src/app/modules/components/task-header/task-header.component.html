<div class="task-filter-bar">
  <div class="filter-prop">
    @for (f of filters; track f) {
      <ion-button class="filter-btn" [class.active]="activeFilter === f" (click)="setFilter.emit(f)" color="none">
        {{ f }}
      </ion-button>
    }
  </div>

  <div class="panze-topbar__right">
    <div class="priority-filter-wrap">
      <ion-button color="none" (click)="showPriorityDropdown = !showPriorityDropdown; $event.stopPropagation()">
        <ion-icon name="filter-outline" size="large"></ion-icon>
        @if (activePriority !== 'All') {
          <span class="priority-badge">{{ activePriority }}</span>
        }
      </ion-button>

      @if (showPriorityDropdown) {
        <div class="priority-dropdown">
          @for (p of priorityFiltering; track p) {
            <button
              class="priority-dropdown__item"
              [class.active]="activePriority === p"
              (click)="selectPriority(p)"
            >
              {{ p }}
            </button>
          }
        </div>
      }
    </div>

    <ion-button color="none" class="active" (click)="openModal.emit()">
      <ion-icon name="add-outline"></ion-icon>
      New Task
    </ion-button>
  </div>
</div>
