<app-container>
    <ion-label class="panze-card__title">Import tasks</ion-label>
  
  <div class="filter-prop">
    <ion-button class="filter-btn" color="none"> Today</ion-button>
    <ion-button class="filter-btn" color="none">Tomorrow</ion-button>
  </div>
  
  <div class="ad-card-grid">
    @for (card of tasks; track $index) {
      <app-ad-card [card]="card" />
    }
  </div>
</app-container>
